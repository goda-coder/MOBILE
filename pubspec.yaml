name: wallet
description: "AI-verified mobile wallet for Egypt. Card + Paymob top-ups, KYC with camera, QR pay."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.2

  # Routing
  go_router: ^17.3.0

  # HTTP + auth
  dio: ^5.7.0
  flutter_secure_storage: ^10.3.1
  http: ^1.6.0

  # Camera & media (KYC selfie + ID capture + liveness frames)
  camera: ^0.12.0+1
  image: ^4.2.0           # JPEG re-encoding for liveness frames

  # QR
  qr_flutter: ^4.1.0      # generate
  mobile_scanner: ^7.2.0  # scan (uses MLKit on Android, Vision on iOS)

  # UX
  google_fonts: ^8.1.0    # Jost + Overpass Mono to match the design system
  intl: ^0.20.2           # currency / date formatting

  # Misc
  url_launcher: ^6.3.1    # open Paymob iframe in an in-app browser
  file_picker: ^12.0.0-beta.5

  cupertino_icons: ^1.0.8
  lottie: ^3.3.3
  local_auth: ^3.0.1
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/illustrations/